<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وبلاگ قطعات کامپیوتر</title>
    <meta name="description" content="وبلاگ تخصصی درباره قطعات کامپیوتر و راهنمای خرید آن‌ها">

<body>

    <header>
        <h1 id="title">💻 دنیای قطعات کامپیوتر</h1>
        <input type="text" id="search" placeholder="🔍 جستجو در مقالات..." onkeyup="searchPosts()">
        <div id="auth">
            <form id="loginForm">
                <input type="email" placeholder="ایمیل" required>
                <input type="password" placeholder="رمز عبور" required>
                <button type="submit">ورود</button>
            </form>
            <button id="signup">ثبت‌نام</button>
        </div>
    </header>

    <nav>
        <a href="#" onclick="filterPosts('all')">🏠 همه مقالات</a>
        <a href="#" onclick="filterPosts('cpu')">⚡ پردازنده (CPU)</a>
        <a href="#" onclick="filterPosts('gpu')">🎮 کارت گرافیک (GPU)</a>
        <a href="#" onclick="filterPosts('ram')">🚀 حافظه رم (RAM)</a>
        <a href="#" onclick="filterPosts('storage')">💾 حافظه (SSD & HDD)</a>
        <a href="#" onclick="filterPosts('motherboard')">🔧 مادربرد</a>
    </nav>

    <div class="container" id="posts">
        <!-- مقالات اینجا نمایش داده می‌شوند -->
    </div>
